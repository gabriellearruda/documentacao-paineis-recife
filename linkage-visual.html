<title>Fluxo de Linkage — vitallinkage2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:         #101B7A;
    --navy-light:   #E6E8F5;
    --purple:       #534AB7;
    --purple-mid:   #3C3489;
    --purple-light: #EEEDFE;
    --coral:        #F08373;
    --coral-deep:   #993C1D;
    --coral-light:  #FAECE7;
    --yellow:       #FFCB37;
    --ink:          #1A1A1A;
    --text:         #1F2125;
    --text-2:       #4F5360;
    --text-3:       #7C808B;
    --paper:        #fdfbf7;
    --paper-soft:   #F7F4EE;
    --border:       rgba(22,36,92,0.13);
    --font-serif:   Georgia, 'Times New Roman', serif;
    --font-sans:    system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  html { -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--font-sans);
    background: var(--paper);
    color: var(--text);
    padding: 0;
    line-height: 1.55;
  }

  /* ── Page body ── */
  .page {
    max-width: 980px; margin: 0 auto;
    padding: 2.5rem 2.5rem 5rem;
  }

  /* ── Diagram ── */
  .diagram-wrap { overflow-x: auto; }

  /* ── Detail panel ── */
  .detail {
    margin-top: 1.25rem;
    border-left: 3px solid var(--navy);
    padding: 0.9rem 1.2rem;
    background: var(--paper-soft);
    border-radius: 0 6px 6px 0;
    display: none;
  }
  .detail.open { display: block; }
  .detail-ttl {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; color: var(--navy); margin-bottom: 5px;
  }
  .detail-txt { font-size: 13.5px; color: var(--text-2); line-height: 1.65; }
  .detail-txt code {
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: 12px; background: #E8E5DE;
    padding: 1px 4px; border-radius: 3px; color: var(--navy);
  }

  /* ── Phase pills ── */
  .phases {
    display: flex; gap: 0.75rem; margin-bottom: 1.75rem; flex-wrap: wrap;
  }
  .phase-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px 5px 8px;
    border-radius: 999px; font-size: 12px; font-weight: 600;
    border: 1px solid currentColor;
  }
  .phase-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .pill-navy  { color: var(--navy);   border-color: rgba(16,27,122,0.3);  background: var(--navy-light); }
  .pill-navy .dot  { background: var(--navy); }
  .pill-purple{ color: var(--purple); border-color: rgba(83,74,183,0.3);  background: var(--purple-light); }
  .pill-purple .dot{ background: var(--purple); }
  .pill-coral { color: var(--coral-deep); border-color: rgba(240,131,115,0.4); background: var(--coral-light); }
  .pill-coral .dot { background: var(--coral); }

  .hint {
    font-size: 12px; color: var(--text-3); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 5px;
  }
  .hint::before {
    content: '↗';
    font-size: 11px; opacity: 0.6;
  }
</style>

<script>
const INFO = {
  sim: {
    title: 'SIM — Sistema de Informação sobre Mortalidade',
    html: 'Registros de óbitos.'

  sinan: {
    title: 'SINAN — Sistema de Informação de Agravos de Notificação',
    html: 'Notificações de doenças e agravos de saúde.'
  },
  sih: {
    title: 'SIH — Sistema de Informação Hospitalar',
    html: 'Registros de internações hospitalares.'
  },
  'pre-sim': {
    title: 'Pré-processamento — SIM',
    html: `<ul style="margin:0 0 0 1.1rem;line-height:2;font-size:13px;color:#4F5360;"><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">limpa_ignorados_sim</code> — Remove valores "IGNORADO", "DESCONHECIDO" e similares</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">padroniza_variaveis</code> — Renomeia colunas para o padrão do pacote</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">ajuste_data(DD/MM/YYYY)</code> — Converte colunas de data para tipo Date</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">ano_sim</code> — Extrai o ano do óbito como coluna auxiliar</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">as_char</code> — Converte todas as colunas para character</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">copia_nomes</code> — Cria cópia das colunas de nome (preserva original)</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">ajuste_txt</code> — Remove acentos, converte para maiúsculas, elimina prefixos/sufixos/conectivos</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">gemelar</code> — Detecta e marca registros de gêmeos</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">soundex_linkage(nome_pac)</code> — Código fonético do nome do paciente</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">soundex_linkage(nome_pai)</code> — Código fonético do nome do pai</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">soundex_linkage(nome_mae)</code> — Código fonético do nome da mãe</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">ajuste_res</code> — Padroniza variáveis de endereço</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">soundex_linkage(bairro, rua, comple)</code> — Código fonético dos campos de endereço</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">drop_duplicados</code> — Remove registros exatamente duplicados</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">ds_raca_sim</code> — Decodifica campo de raça/etnia</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">corrige_sg_sexo</code> — Corrige campo de sexo</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">nu_idade_anos</code> — Calcula idade em anos</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">faixa_etaria</code> — Cria faixas etárias</li><li><code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">mutate(morreu = 1)</code> — Marca todos os registros como óbito</li></ul>`
  },

<pre style="background:#1E2535;color:#C8D6F0;border-radius:6px;padding:0.85rem 1rem;font-size:12px;line-height:1.75;overflow-x:auto;white-space:pre;margin-bottom:0.75rem;">Variáveis: ds_nome_pac + dt_nasc

<p style="margin-bottom:0.5rem;">Registros 1 e 2 casaram — mesmo nome e mesma data. Registros 3 e 4 não casaram: a data tem 3 dias de diferença (erro de digitação). Ficam com <code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">par_1 = NA</code>.</p>
<p style="margin-bottom:0.3rem;">A lógica interna:</p>
<ul style="margin:0 0 0 1.25rem;line-height:1.9;font-size:13px;color:#4F5360;"><li>Filtra registros sem NA nas variáveis escolhidas</li><li>Agrupa por igualdade exata dos valores</li><li>Descarta grupos com apenas 1 registro</li><li>Atribui <code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">par_1</code> (ID do grupo) para quem casou</li></ul>`
  },
  regras: {
    title: 'Passo 2 — regras_linkage() — aplicado sequencialmente',
    html: `<p style="margin-bottom:0.75rem;">A cada regra, registros que já têm <code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">par_1</code> mantêm seu ID. Apenas os que ainda estão sem par entram na tentativa de matching. <code style="background:#EDF2F9;color:#2E4F82;padding:1px 4px;border-radius:3px;font-size:11px;">meio_de_campo()</code> é chamado automaticamente ao final de cada regra.</p>
